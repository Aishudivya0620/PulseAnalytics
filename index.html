<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Production-level Social Media Analytics Dashboard" />
    <title>PulseAnalytics | Dashboard</title>
    <script>
      (function() {
        try {
          var theme = localStorage.getItem('theme');
          var supportDarkMode = window.matchMedia('(prefers-color-scheme: dark)').matches === true;
          if (theme === 'dark' || (!theme && supportDarkMode)) {
            document.documentElement.classList.add('dark');
            document.documentElement.style.backgroundColor = '#030712';
          } else if (theme === 'light') {
            document.documentElement.classList.remove('dark');
            document.documentElement.style.backgroundColor = '#ffffff';
          }

          // Handle HashRouter redirection for manual URL entry
          var path = window.location.pathname;
          var hash = window.location.hash;
          // Production base check
          var base = '/PulseAnalytics/';
          
          if (!hash) {
            if (path.startsWith(base) && path !== base) {
              var route = path.substring(base.length);
              window.location.replace(base + '#/' + route);
            } else if (path !== '/' && path !== '/PulseAnalytics' && path !== '/PulseAnalytics/') {
              window.location.replace('/#/' + path.substring(1));
            }
          }
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
