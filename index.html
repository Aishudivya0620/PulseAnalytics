<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/PulseAnalytics/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Production-level Social Media Analytics Dashboard" />
    <title>PulseAnalytics | Dashboard</title>
    <script>
      (function() {
        try {
          var theme = localStorage.getItem('theme');
          var supportDarkMode = window.matchMedia('(prefers-color-scheme: dark)').matches === true;
          if (theme === 'dark' || (!theme && supportDarkMode)) {
            document.documentElement.classList.add('dark');
            document.documentElement.style.backgroundColor = '#030712'; // Deep blue-black from index.css
          } else if (theme === 'light') {
            document.documentElement.classList.remove('dark');
            document.documentElement.style.backgroundColor = '#ffffff';
          }
        } catch (e) {}
      })();
    </script>
    <script type="module" crossorigin src="/PulseAnalytics/assets/index-BHLYzPEP.js"></script>
    <link rel="stylesheet" crossorigin href="/PulseAnalytics/assets/index-DuBFDeHU.css">
  </head>

    <div id="root"></div>
  </body>
</html>
